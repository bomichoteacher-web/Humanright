<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기본권 리듬게임</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#07070f;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
    #g{width:100%;max-width:480px;background:#0d0d1a;border-radius:16px;overflow:hidden;box-shadow:0 0 40px rgba(127,119,221,0.15);}
    #topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:#111122;border-bottom:1px solid #222244;}
    .tl{font-size:10px;color:#555;letter-spacing:1px;margin-bottom:2px;}
    .tv{font-size:18px;font-weight:500;color:#ddd;}
    #lane-wrap{position:relative;width:100%;height:340px;background:#0d0d1a;overflow:hidden;}
    #center-line{position:absolute;top:0;bottom:0;left:50%;width:1px;transform:translateX(-50%);background:#1a1a2e;}
    #hitline{position:absolute;bottom:68px;left:50%;transform:translateX(-50%);width:148px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;}
    .note{position:absolute;left:50%;transform:translateX(-50%);width:144px;height:38px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;border-radius:6px;pointer-events:none;padding:0 10px;background:#1e1e33;border:2px solid #3a3a5a;color:#ccc;white-space:nowrap;transition:background 0.08s,border-color 0.08s,color 0.08s,opacity 0.15s;}
    #fb{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-size:26px;font-weight:500;pointer-events:none;opacity:0;transition:opacity 0.1s;white-space:nowrap;}
    #combodisp{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:12px;color:#ffdd57;font-weight:500;opacity:0;transition:opacity 0.2s;}
    .screen{position:absolute;inset:0;background:rgba(10,10,22,0.97);display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;}
    .otitle{font-size:20px;font-weight:500;color:#eee;}
    .osub{font-size:12px;color:#666;text-align:center;line-height:1.7;}
    .lgrow{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
    .lgitem{display:flex;align-items:center;gap:6px;font-size:12px;color:#bbb;}
    .lgdot{width:10px;height:10px;border-radius:2px;}
    .obtn{padding:9px 26px;background:transparent;border:1.5px solid #444;border-radius:8px;color:#ccc;font-size:13px;cursor:pointer;}
    .obtn:hover{border-color:#888;}
    .obtn.accent{border-color:#7F77DD;color:#afa9ec;}
    .obtn.accent:hover{background:rgba(127,119,221,0.1);}
    #key-row{display:flex;justify-content:center;background:#0a0a16;border-top:1px solid #1a1a2e;padding:6px 8px;}
    .key-btn{flex:1;max-width:72px;height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;border:1.5px solid;font-size:9px;font-weight:500;cursor:pointer;background:transparent;gap:3px;transition:transform 0.07s,opacity 0.07s,background 0.1s;margin:0 3px;}
    .key-btn.pressed{transform:scale(0.86);opacity:0.55;}
    .key-kbd{font-size:14px;font-weight:500;}
    .txt-input{background:#111122;border:1.5px solid #333;border-radius:8px;padding:9px 14px;color:#eee;font-size:14px;width:220px;text-align:center;outline:none;}
    .txt-input:focus{border-color:#7F77DD;}
    .input-label{font-size:11px;color:#555;align-self:flex-start;margin-left:calc(50% - 110px);}
    .info-badge{font-size:10px;background:rgba(127,119,221,0.12);color:#afa9ec;border:0.5px solid #534AB7;border-radius:4px;padding:3px 10px;}
    .rank-card{width:100%;max-width:360px;padding:10px 14px;border-radius:8px;border:0.5px solid #1e1e33;background:#111122;display:grid;grid-template-columns:36px 1fr auto;align-items:center;gap:8px;margin-bottom:6px;}
    .rank-card.me{border-color:#7F77DD;background:rgba(127,119,221,0.1);}
    .rank-card.gold{border-color:#ffdd57;background:rgba(255,221,87,0.05);}
    .rank-card.silver{border-color:#ccc;background:rgba(200,200,200,0.04);}
    .rank-card.bronze{border-color:#cd7f32;background:rgba(205,127,50,0.05);}
    .rank-medal{font-size:20px;text-align:center;}
    .rank-info{display:flex;flex-direction:column;gap:2px;min-width:0;}
    .rank-name{font-size:14px;font-weight:500;color:#eee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .rank-meta{font-size:10px;color:#555;}
    .rank-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
    .rank-score{font-size:15px;font-weight:500;color:#afa9ec;}
    .rank-combo{font-size:10px;color:#FAC775;}
    .rank-empty{color:#333;font-size:12px;text-align:center;padding:16px 0;width:100%;}
    @media(max-width:500px){body{align-items:flex-start;}#g{border-radius:0;min-height:100vh;}}
  </style>
</head>
<body>
<div id="g">
  <div id="topbar">
    <div><div class="tl">SCORE</div><div class="tv" id="sc">0</div></div>
    <div style="text-align:center"><div class="tl">기본권 리듬</div><div style="font-size:11px;color:#444;" id="prog">대기중</div></div>
    <div style="text-align:right"><div class="tl">콤보</div><div class="tv" id="cb">0</div></div>
  </div>
  <div id="lane-wrap">
    <div id="center-line"></div>
    <div id="hitline"></div>
    <div id="fb"></div>
    <div id="combodisp"></div>

    <div id="class-screen" class="screen" style="display:flex;">
      <div class="otitle">기본권 리듬게임</div>
      <div class="osub">시작 전에 정보를 입력해 주세요</div>
      <div class="input-label">학교 이름</div>
      <input class="txt-input" id="school-input" type="text" placeholder="예: 보미중학교" maxlength="20"/>
      <div class="input-label" style="margin-top:2px;">반</div>
      <input class="txt-input" id="class-input" type="text" placeholder="예: 2학년 3반" maxlength="20"/>
      <div id="class-err" style="font-size:11px;color:#e87777;min-height:14px;"></div>
      <button class="obtn accent" onclick="confirmClass()">다음 →</button>
    </div>

    <div id="overlay" class="screen">
      <div class="otitle">기본권 리듬게임</div>
      <div class="osub">내용을 읽고 해당 기본권 버튼을 눌러요<br>맞추면 기본권 색깔로 번쩍여요!</div>
      <div class="lgrow" id="lg"></div>
      <div id="info-badges" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;"></div>
      <div class="osub" style="font-size:10px;color:#444;">모바일: 버튼 탭 / PC: 키보드 A S D F G</div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="obtn accent" onclick="startGame()">시작하기 ▶</button>
        <button class="obtn" onclick="showRanking()">TOP 5 랭킹 ★</button>
      </div>
      <button class="obtn" style="font-size:11px;padding:5px 12px;" onclick="changeClass()">정보 바꾸기</button>
    </div>

    <div id="result-screen" class="screen">
      <div class="otitle" id="rgrade"></div>
      <div class="osub" id="rstats"></div>
      <div id="rmiss" style="font-size:11px;color:#c88;text-align:center;line-height:1.9;max-width:260px;"></div>
      <div class="osub" style="margin-top:4px;">닉네임 입력하고 TOP 5 도전!</div>
      <input class="txt-input" id="name-input" type="text" placeholder="이름 또는 닉네임" maxlength="12"/>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="obtn accent" onclick="submitScore()">랭킹 등록 ★</button>
        <button class="obtn" onclick="goHome()">건너뛰기</button>
      </div>
      <div id="submit-msg" style="font-size:11px;color:#9FE1CB;min-height:16px;"></div>
    </div>

    <div id="ranking-screen" class="screen" style="justify-content:flex-start;padding-top:20px;overflow-y:auto;">
      <div class="otitle" style="margin-bottom:2px;">★ TOP 5 랭킹</div>
      <div id="ranking-label" class="osub" style="font-size:10px;margin-bottom:14px;"></div>
      <div id="rank-list" style="width:100%;max-width:360px;"></div>
      <button class="obtn" style="margin-top:12px;" onclick="goHome()">돌아가기</button>
    </div>
  </div>
  <div id="key-row"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyDEJa9JE5_UE-GjdJvfd03K7GA8rbYUDIA",authDomain:"humanright-game.firebaseapp.com",projectId:"humanright-game",storageBucket:"humanright-game.firebasestorage.app",messagingSenderId:"958967423997",appId:"1:958967423997:web:22fec37e235309f5adaf94"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
window._db=db;window._col=(n)=>collection(db,n);window._addDoc=addDoc;window._getDocs=getDocs;window._query=query;window._orderBy=orderBy;window._limit=limit;window._where=where;
</script>

<script>
const AudioContext=window.AudioContext||window.webkitAudioContext;
let actx=null;
function ensureAudio(){if(!actx)actx=new AudioContext();}
function pn(f,w,d,t,v){if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,w);g.gain.exponentialRampToValueAtTime(0.001,w+d);o.start(w);o.stop(w+d);}
function pb(f,d,t,v){if(!actx)return;pn(f,actx.currentTime,d,t,v);}
let bgTimer;
function playBg(){if(!actx)return;const B=128,b=60/B;const mel=[[523,b/2],[659,b/2],[784,b],[659,b/2],[523,b/2],[440,b],[523,b],[392,b*2],[523,b/2],[659,b/2],[784,b],[880,b/2],[784,b/2],[659,b],[523,b],[440,b*2]];const bass=[262,196,220,196,262,196,220,196];let t=actx.currentTime+0.1;const loop=()=>{mel.forEach(([f,d])=>{pn(f,t,d*0.85,'square',0.06);t+=d;});let bt=actx.currentTime+0.1;bass.forEach((f,i)=>{pn(f,bt+i*b,b*0.5,'triangle',0.04);});bgTimer=setTimeout(loop,mel.reduce((a,[,d])=>a+d,0)*1000-200);};loop();}
function playHit(p){pb(p?880:660,0.08,'square',0.1);if(p)setTimeout(()=>pb(1047,0.06,'square',0.07),40);}
function playMiss(){pb(200,0.12,'sawtooth',0.06);}

const LANES=[{key:'자유권',kbd:'A',color:'#7F77DD',light:'#afa9ec',dark:'#26215C'},{key:'평등권',kbd:'S',color:'#1D9E75',light:'#9FE1CB',dark:'#04342C'},{key:'사회권',kbd:'D',color:'#EF9F27',light:'#FAC775',dark:'#412402'},{key:'참정권',kbd:'F',color:'#D4537E',light:'#F4C0D1',dark:'#4B1528'},{key:'청구권',kbd:'G',color:'#378ADD',light:'#B5D4F4',dark:'#042C53'}];
const NOTE_POOL=[{l:0,w:'신체의 자유'},{l:0,w:'언론의 자유'},{l:0,w:'출판의 자유'},{l:0,w:'종교의 자유'},{l:0,w:'직업 선택의 자유'},{l:0,w:'거주 이전의 자유'},{l:0,w:'양심의 자유'},{l:0,w:'집회·결사의 자유'},{l:1,w:'법 앞의 평등'},{l:1,w:'성별 차별 금지'},{l:1,w:'종교 차별 금지'},{l:1,w:'신분 차별 금지'},{l:1,w:'사회적 차별 금지'},{l:1,w:'양성평등'},{l:1,w:'인종 차별 금지'},{l:2,w:'교육받을 권리'},{l:2,w:'근로의 권리'},{l:2,w:'인간다운 생활권'},{l:2,w:'쾌적한 환경권'},{l:2,w:'최저 임금 보장'},{l:2,w:'사회 보장권'},{l:2,w:'건강권'},{l:3,w:'선거권'},{l:3,w:'공무 담임권'},{l:3,w:'국민 투표권'},{l:3,w:'국민 발안권'},{l:3,w:'정치 참여권'},{l:4,w:'재판 청구권'},{l:4,w:'국가 배상 청구권'},{l:4,w:'청원권'},{l:4,w:'형사 보상 청구권'},{l:4,w:'손실 보상 청구권'}];

function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildQueue(){const s=shuffle(NOTE_POOL),out=[];for(let i=0;i<s.length;i++){if(i>0&&s[i].l===out[out.length-1].l){for(let j=i+1;j<s.length;j++){if(s[j].l!==out[out.length-1].l){[s[i],s[j]]=[s[j],s[i]];break;}}}out.push(s[i]);}return out;}

const NOTE_SPEED=0.8,SPAWN_MS=3600,PERF_WIN=44,GOOD_WIN=75;
let laneEl,keyRow,activeNotes=[],score=0,combo=0,maxCombo=0,total=0,hits=0,misses=0,perfects=0,wrongLog=[];
let running=false,raf,spawnIdx=0,spawnInterval,lastTs=0;
let finalScore=0,finalAcc=0,finalCombo=0,lastSubmittedName='';
let noteQueue=[],currentSchool='',currentClass='';

function showOnly(id){['class-screen','overlay','result-screen','ranking-screen'].forEach(s=>{document.getElementById(s).style.display=s===id?'flex':'none';});}

function confirmClass(){
  const school=document.getElementById('school-input').value.trim();
  const cls=document.getElementById('class-input').value.trim();
  if(!school||!cls){document.getElementById('class-err').textContent='학교 이름과 반을 모두 입력해 주세요!';return;}
  currentSchool=school;currentClass=cls;
  document.getElementById('class-err').textContent='';
  document.getElementById('info-badges').innerHTML=`<span class="info-badge">${currentSchool}</span><span class="info-badge">${currentClass}</span>`;
  showOnly('overlay');
}
function changeClass(){showOnly('class-screen');}

function buildUI(){
  laneEl=document.getElementById('lane-wrap');keyRow=document.getElementById('key-row');keyRow.innerHTML='';
  const lg=document.getElementById('lg');lg.innerHTML='';
  LANES.forEach((lane,i)=>{
    const btn=document.createElement('button');btn.className='key-btn';
    btn.style.cssText=`border-color:${lane.color};color:${lane.light};`;
    btn.innerHTML=`<span class="key-kbd" style="color:${lane.light}">${lane.key[0]}</span><span style="color:${lane.color};font-size:9px;">${lane.key}</span><span style="color:#333;font-size:8px;">[${lane.kbd}]</span>`;
    btn.dataset.i=i;btn.addEventListener('pointerdown',e=>{e.preventDefault();pressLane(i,btn);});keyRow.appendChild(btn);
    const d=document.createElement('div');d.className='lgitem';d.innerHTML=`<div class="lgdot" style="background:${lane.color}"></div><span>${lane.key}</span>`;lg.appendChild(d);
  });
}

function spawnNote(){if(spawnIdx>=noteQueue.length)return;const d=noteQueue[spawnIdx++];total++;const el=document.createElement('div');el.className='note';el.textContent=d.w;laneEl.appendChild(el);activeNotes.push({el,lane:d.l,word:d.w,y:-42,hit:false,missed:false});}

function pressLane(i,btn){
  if(!running)return;ensureAudio();btn.classList.add('pressed');setTimeout(()=>btn.classList.remove('pressed'),120);
  const hitY=laneEl.clientHeight-68;let best=null,bestD=9999;
  for(const n of activeNotes){if(n.hit||n.missed)continue;const d=Math.abs(n.y-hitY);if(d<bestD){bestD=d;best=n;}}
  if(!best||bestD>GOOD_WIN)return;
  if(best.lane===i){if(bestD<=PERF_WIN)doHit(best,'PERFECT',100,true);else doHit(best,'GOOD',50,false);}
  else doWrong(best,i);
}

function doHit(note,label,pts,perf){
  note.hit=true;const lane=LANES[note.lane];
  note.el.style.background=lane.dark;note.el.style.borderColor=lane.color;note.el.style.color=lane.light;note.el.style.boxShadow=`0 0 12px ${lane.color}88`;
  const tb=keyRow.querySelectorAll('.key-btn')[note.lane];const prev=tb.style.background;tb.style.background=lane.dark;setTimeout(()=>{tb.style.background=prev;},220);
  setTimeout(()=>{note.el.style.opacity='0';setTimeout(()=>note.el.remove(),160);},180);
  hits++;if(perf)perfects++;combo++;if(combo>maxCombo)maxCombo=combo;score+=pts+(combo>1?combo*4:0);
  playHit(perf);showFb(label,perf?'#ffdd57':'#a8e6a8');updateHUD();
}

function doWrong(note,pl){
  note.missed=true;note.el.style.background='#3a1a1a';note.el.style.borderColor='#e87777';note.el.style.color='#e87777';note.el.style.boxShadow='0 0 10px #e8777755';
  misses++;combo=0;wrongLog.push(note.word+' → '+LANES[note.lane].key+' (누른 키: '+LANES[pl].key+')');
  setTimeout(()=>{note.el.style.opacity='0';setTimeout(()=>note.el.remove(),160);},300);
  playMiss();showFb('틀렸어요!','#e87777');updateHUD();
}

function showFb(text,color){const fb=document.getElementById('fb');fb.textContent=text;fb.style.color=color;fb.style.opacity='1';clearTimeout(fb._t);fb._t=setTimeout(()=>fb.style.opacity='0',350);const cd=document.getElementById('combodisp');if(combo>1){cd.textContent=combo+' COMBO';cd.style.opacity='1';clearTimeout(cd._t);cd._t=setTimeout(()=>cd.style.opacity='0',500);}}
function updateHUD(){document.getElementById('sc').textContent=score.toLocaleString();document.getElementById('cb').textContent=combo;document.getElementById('prog').textContent=Math.min(spawnIdx,noteQueue.length)+' / '+noteQueue.length;}

function gameLoop(ts){
  if(!running)return;const dt=ts-lastTs;lastTs=ts;const hitY=laneEl.clientHeight-68;
  for(const n of activeNotes){if(n.hit||n.missed)continue;n.y+=NOTE_SPEED*(dt/16);n.el.style.top=n.y+'px';if(n.y>hitY+GOOD_WIN+30){n.missed=true;misses++;combo=0;n.el.style.opacity='0.1';wrongLog.push(n.word+' ('+LANES[n.lane].key+') — 놓침');playMiss();showFb('MISS','#e87777');updateHUD();setTimeout(()=>n.el.remove(),300);}}
  activeNotes=activeNotes.filter(n=>!n.hit&&!n.missed||n.el.isConnected);
  if(spawnIdx>=noteQueue.length&&activeNotes.filter(n=>!n.hit&&!n.missed).length===0){endGame();return;}
  raf=requestAnimationFrame(gameLoop);
}

function startGame(){
  ensureAudio();['overlay','result-screen','ranking-screen','class-screen'].forEach(s=>document.getElementById(s).style.display='none');
  score=0;combo=0;maxCombo=0;total=0;hits=0;misses=0;perfects=0;wrongLog=[];spawnIdx=0;activeNotes=[];
  noteQueue=buildQueue();laneEl.querySelectorAll('.note').forEach(e=>e.remove());
  running=true;lastTs=performance.now();updateHUD();playBg();
  let c=0;spawnInterval=setInterval(()=>{if(!running){clearInterval(spawnInterval);return;}spawnNote();c++;if(c>=noteQueue.length)clearInterval(spawnInterval);},SPAWN_MS);
  raf=requestAnimationFrame(gameLoop);
}

function endGame(){
  running=false;cancelAnimationFrame(raf);clearInterval(spawnInterval);clearTimeout(bgTimer);if(actx)actx.close().then(()=>{actx=null;});
  finalAcc=hits+misses>0?Math.round(hits/(hits+misses)*100):100;finalScore=score;finalCombo=maxCombo;
  const grade=finalAcc===100?'S  완벽해요!':finalAcc>=90?'A  훌륭해요!':finalAcc>=70?'B  잘했어요!':'C  다시 도전!';
  document.getElementById('rgrade').textContent=grade;
  document.getElementById('rstats').textContent=`점수 ${finalScore.toLocaleString()}  ·  정확도 ${finalAcc}%  ·  최대콤보 x${maxCombo}`;
  const uniq=[...new Set(wrongLog)].slice(0,5);
  document.getElementById('rmiss').innerHTML=uniq.length?'틀린 노트:<br>'+uniq.join('<br>'):'<span style="color:#9FE1CB">모두 맞혔어요!</span>';
  document.getElementById('submit-msg').textContent='';document.getElementById('name-input').value=lastSubmittedName;
  showOnly('result-screen');
}

async function submitScore(){
  const name=document.getElementById('name-input').value.trim();
  if(!name){document.getElementById('submit-msg').textContent='이름을 입력해 주세요!';return;}
  document.getElementById('submit-msg').textContent='등록 중...';lastSubmittedName=name;
  const today=new Date();
  const entry={name,score:finalScore,combo:finalCombo,date:(today.getMonth()+1)+'/'+(today.getDate()),school:currentSchool,classCode:currentClass,ts:Date.now()};
  try{await window._addDoc(window._col('ranking'),entry);document.getElementById('submit-msg').textContent='등록 완료!';setTimeout(()=>showRanking(),700);}
  catch(e){document.getElementById('submit-msg').textContent='등록 실패: '+e.message;}
}

async function showRanking(){
  showOnly('ranking-screen');document.getElementById('ranking-label').textContent=currentSchool+' · '+currentClass;
  const list=document.getElementById('rank-list');list.innerHTML='<div class="rank-empty">불러오는 중...</div>';
  try{
    const q=window._query(window._col('ranking'),window._where('school','==',currentSchool),window._where('classCode','==',currentClass),window._orderBy('score','desc'),window._limit(5));
    const snap=await window._getDocs(q);const entries=[];snap.forEach(doc=>entries.push(doc.data()));
    if(!entries.length){list.innerHTML='<div class="rank-empty">아직 이 반 기록이 없어요!<br>첫 번째 랭커가 되어보세요</div>';return;}
    list.innerHTML='';
    ['🥇','🥈','🥉','4','5'].forEach((medal,i)=>{
      if(!entries[i])return;const e=entries[i],isMe=e.name===lastSubmittedName;
      const cls=['gold','silver','bronze','',''][i];const card=document.createElement('div');
      card.className='rank-card'+(cls?' '+cls:'')+(isMe?' me':'');
      card.innerHTML=`<div class="rank-medal">${medal}</div><div class="rank-info"><div class="rank-name">${e.name}</div><div class="rank-meta">${e.date} · 최대콤보 x${e.combo}</div></div><div class="rank-right"><div class="rank-score">${e.score.toLocaleString()}</div><div class="rank-combo">콤보 x${e.combo}</div></div>`;
      list.appendChild(card);
    });
  }catch(err){list.innerHTML=`<div class="rank-empty">오류: ${err.message}</div>`;}
}

function goHome(){showOnly('overlay');}
buildUI();window.addEventListener('resize',buildUI);
document.addEventListener('keydown',e=>{if(!running)return;const map={a:0,s:1,d:2,f:3,g:4};const i=map[e.key.toLowerCase()];if(i===undefined)return;e.preventDefault();pressLane(i,keyRow.querySelectorAll('.key-btn')[i]);});
['school-input','class-input'].forEach(id=>{document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')confirmClass();});});
</script>
