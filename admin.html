<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기본권 리듬게임 — 관리자</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#07070f;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#ddd;padding:24px 16px;}
    h1{font-size:18px;font-weight:500;color:#eee;margin-bottom:4px;}
    .sub{font-size:12px;color:#444;margin-bottom:24px;}

    /* 로그인 */
    #login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:12px;}
    .login-box{background:#111122;border:0.5px solid #222244;border-radius:12px;padding:32px;width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px;align-items:center;}
    .login-title{font-size:16px;font-weight:500;color:#eee;}
    .login-sub{font-size:12px;color:#555;text-align:center;}
    input[type=password]{background:#0d0d1a;border:1px solid #2a2a4a;border-radius:8px;padding:10px 14px;color:#eee;font-size:14px;width:100%;outline:none;text-align:center;letter-spacing:4px;}
    input[type=password]:focus{border-color:#7F77DD;}
    .btn{padding:10px 24px;background:transparent;border:1.5px solid #444;border-radius:8px;color:#ccc;font-size:13px;cursor:pointer;width:100%;}
    .btn:hover{border-color:#888;}
    .btn.accent{border-color:#7F77DD;color:#afa9ec;}
    .btn.accent:hover{background:rgba(127,119,221,0.1);}
    .btn.danger{border-color:#e87777;color:#e87777;}
    .btn.danger:hover{background:rgba(232,119,119,0.1);}
    #login-err{font-size:11px;color:#e87777;min-height:14px;}

    /* 관리자 */
    #admin-wrap{display:none;max-width:720px;margin:0 auto;}
    .toprow{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
    .stat-card{background:#111122;border:0.5px solid #222244;border-radius:8px;padding:12px 16px;}
    .stat-label{font-size:10px;color:#555;letter-spacing:1px;margin-bottom:4px;}
    .stat-val{font-size:22px;font-weight:500;color:#eee;}
    .table-wrap{background:#111122;border:0.5px solid #222244;border-radius:10px;overflow:hidden;margin-bottom:16px;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    thead tr{background:#0d0d1a;border-bottom:1px solid #222244;}
    th{padding:10px 14px;text-align:left;font-size:10px;color:#555;letter-spacing:1px;font-weight:500;}
    td{padding:10px 14px;border-bottom:0.5px solid #1a1a2e;color:#ccc;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(127,119,221,0.04);}
    .rank-badge{display:inline-block;width:22px;height:22px;border-radius:4px;font-size:11px;font-weight:500;text-align:center;line-height:22px;}
    .r1{background:rgba(255,221,87,0.15);color:#ffdd57;}
    .r2{background:rgba(200,200,200,0.1);color:#ccc;}
    .r3{background:rgba(205,127,50,0.15);color:#cd7f32;}
    .rn{background:#1a1a2e;color:#555;}
    .score-col{color:#afa9ec;font-weight:500;}
    .combo-col{color:#FAC775;}
    .acc-col{color:#9FE1CB;}
    .empty{text-align:center;padding:32px;color:#333;font-size:13px;}
    .loading{text-align:center;padding:32px;color:#444;font-size:13px;}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap;}
    #reset-confirm{display:none;background:#1a0d0d;border:1px solid #e87777;border-radius:8px;padding:14px;margin-bottom:12px;font-size:13px;color:#e8a0a0;line-height:1.6;}
    .chip{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;background:#1e1e33;color:#555;margin-left:6px;}
    #refresh-btn{font-size:11px;color:#555;cursor:pointer;border:none;background:none;padding:4px 8px;}
    #refresh-btn:hover{color:#888;}
  </style>
</head>
<body>

<!-- 로그인 -->
<div id="login-wrap">
  <div class="login-box">
    <div class="login-title">관리자 로그인</div>
    <div class="login-sub">기본권 리듬게임<br>학생 점수 관리 페이지</div>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')tryLogin()"/>
    <button class="btn accent" onclick="tryLogin()">로그인</button>
    <div id="login-err"></div>
  </div>
</div>

<!-- 관리자 대시보드 -->
<div id="admin-wrap">
  <div class="toprow">
    <div>
      <h1>기본권 리듬게임 관리자</h1>
      <div class="sub">학생 점수 현황 · 실시간 업데이트</div>
    </div>
    <div class="btn-row">
      <button class="btn" id="refresh-btn" onclick="loadData()">새로고침</button>
      <button class="btn danger" onclick="showResetConfirm()">점수 초기화</button>
      <button class="btn" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div id="reset-confirm">
    ⚠️ 모든 학생 점수가 삭제돼요. 정말 초기화할까요?<br>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button class="btn danger" style="width:auto;padding:6px 16px;" onclick="resetAll()">네, 초기화할게요</button>
      <button class="btn" style="width:auto;padding:6px 16px;" onclick="hideResetConfirm()">취소</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-label">총 플레이 수</div><div class="stat-val" id="s-total">-</div></div>
    <div class="stat-card"><div class="stat-label">최고 점수</div><div class="stat-val" id="s-top">-</div></div>
    <div class="stat-card"><div class="stat-label">평균 점수</div><div class="stat-val" id="s-avg">-</div></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>순위</th>
          <th>이름</th>
          <th>점수</th>
          <th>최대콤보</th>
          <th>날짜</th>
        </tr>
      </thead>
      <tbody id="rank-body">
        <tr><td colspan="5" class="loading">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDEJa9JE5_UE-GjdJvfd03K7GA8rbYUDIA",
  authDomain: "humanright-game.firebaseapp.com",
  projectId: "humanright-game",
  storageBucket: "humanright-game.firebasestorage.app",
  messagingSenderId: "958967423997",
  appId: "1:958967423997:web:22fec37e235309f5adaf94"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window._db = db;
window._collection = collection;
window._getDocs = getDocs;
window._deleteDoc = deleteDoc;
window._doc = doc;
window._query = query;
window._orderBy = orderBy;
window._dbReady = true;
</script>

<script>
// ★ 여기서 비밀번호 바꾸세요!
const ADMIN_PW = 'teacher1234';

function tryLogin(){
  const pw = document.getElementById('pw-input').value;
  if(pw === ADMIN_PW){
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('admin-wrap').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-err').textContent = '비밀번호가 틀렸어요.';
    document.getElementById('pw-input').value = '';
  }
}

function logout(){
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('admin-wrap').style.display = 'none';
  document.getElementById('pw-input').value = '';
}

async function loadData(){
  const body = document.getElementById('rank-body');
  body.innerHTML = '<tr><td colspan="5" class="loading">불러오는 중...</td></tr>';
  try {
    const q = window._query(window._collection(window._db,'ranking'), window._orderBy('score','desc'));
    const snap = await window._getDocs(q);
    const entries = [];
    snap.forEach(d => entries.push({id: d.id, ...d.data()}));

    // 통계
    document.getElementById('s-total').textContent = entries.length;
    if(entries.length > 0){
      document.getElementById('s-top').textContent = entries[0].score.toLocaleString();
      const avg = Math.round(entries.reduce((a,e)=>a+e.score,0)/entries.length);
      document.getElementById('s-avg').textContent = avg.toLocaleString();
    } else {
      document.getElementById('s-top').textContent = '-';
      document.getElementById('s-avg').textContent = '-';
    }

    if(!entries.length){
      body.innerHTML = '<tr><td colspan="5" class="empty">아직 등록된 점수가 없어요</td></tr>';
      return;
    }

    body.innerHTML = '';
    entries.forEach((e, i) => {
      const badgeClass = i===0?'r1':i===1?'r2':i===2?'r3':'rn';
      const badgeText = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><span class="rank-badge ${badgeClass}">${badgeText}</span></td>
        <td>${e.name}</td>
        <td class="score-col">${e.score.toLocaleString()}</td>
        <td class="combo-col">x${e.combo}</td>
        <td>${e.date || '-'}</td>
      `;
      body.appendChild(tr);
    });
  } catch(err) {
    body.innerHTML = `<tr><td colspan="5" class="empty">오류: ${err.message}</td></tr>`;
  }
}

function showResetConfirm(){ document.getElementById('reset-confirm').style.display = 'block'; }
function hideResetConfirm(){ document.getElementById('reset-confirm').style.display = 'none'; }

async function resetAll(){
  hideResetConfirm();
  const body = document.getElementById('rank-body');
  body.innerHTML = '<tr><td colspan="5" class="loading">삭제 중...</td></tr>';
  try {
    const snap = await window._getDocs(window._collection(window._db,'ranking'));
    const deletes = [];
    snap.forEach(d => deletes.push(window._deleteDoc(window._doc(window._db,'ranking',d.id))));
    await Promise.all(deletes);
    document.getElementById('s-total').textContent = '0';
    document.getElementById('s-top').textContent = '-';
    document.getElementById('s-avg').textContent = '-';
    body.innerHTML = '<tr><td colspan="5" class="empty">모든 점수가 초기화되었어요</td></tr>';
  } catch(err) {
    body.innerHTML = `<tr><td colspan="5" class="empty">오류: ${err.message}</td></tr>`;
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') tryLogin();
});
</script>
</body>
</html>
